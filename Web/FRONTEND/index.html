<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiendecita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <header class="bg-white border-bottom shadow-sm">
        <div class="container py-3 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 mb-0">Tiendecita</h1>
                <p class="text-muted mb-0">La de tus sueños mi amor</p>
            </div>
            <div>
                <button id="homeBtn" class="btn btn-outline-secondary">Home</button>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <section id="catalogoContainer">
            <div class="bg-white shadow-sm rounded p-4">
                <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                    <h2 class="h4 mb-0">Catálogo de productos</h2>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar producto...">
                        <button id="buscarbtn" class="btn btn-primary">Buscar</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Producto</th>
                                <th>Descripción</th>
                                <th>Precio</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white border-top mt-4">
        <div class="container py-3 text-center">
            <p class="mb-0">&copy; 2024 Tiendecita. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const tablaProductos = document.getElementById("tablaProductos");
        const searchInput = document.getElementById("searchInput");
        const buscarbtn = document.getElementById("buscarbtn");
        const homeBtn = document.getElementById("homeBtn");

        let productosGlobal = [];

        homeBtn.addEventListener("click", () => {
            window.location.href = "index.html";
        });

        buscarbtn.addEventListener("click", filtrarProductos);
        searchInput.addEventListener("keyup", (e) => {
            if (e.key === "Enter") {
                filtrarProductos();
            }
        });

        async function cargarProductos() {
            try {
                const respuesta = await fetch("conexion.php?accion=listar");
                const data = await respuesta.json();

                if (!Array.isArray(data)) {
                    tablaProductos.innerHTML = `
                        <tr>
                            <td colspan="3" class="text-center text-danger">No se pudieron cargar los productos</td>
                        </tr>
                    `;
                    return;
                }

                productosGlobal = data;
                renderizarTabla(productosGlobal);

            } catch (error) {
                tablaProductos.innerHTML = `
                    <tr>
                        <td colspan="3" class="text-center text-danger">Error al conectar con el servidor</td>
                    </tr>
                `;
            }
        }

        function renderizarTabla(productos) {
            if (!productos.length) {
                tablaProductos.innerHTML = `
                    <tr>
                        <td colspan="3" class="text-center">No hay productos registrados</td>
                    </tr>
                `;
                return;
            }

            tablaProductos.innerHTML = productos.map(producto => `
                <tr>
                    <td>${producto.nombre}</td>
                    <td>${producto.detalle}</td>
                    <td>$${parseFloat(producto.precio).toFixed(2)}</td>
                </tr>
            `).join("");
        }

        function filtrarProductos() {
            const texto = searchInput.value.trim().toLowerCase();

            const filtrados = productosGlobal.filter(producto =>
                producto.nombre.toLowerCase().includes(texto) ||
                producto.detalle.toLowerCase().includes(texto)
            );

            renderizarTabla(filtrados);
        }

        cargarProductos();
    </script>
</body>
</html>
